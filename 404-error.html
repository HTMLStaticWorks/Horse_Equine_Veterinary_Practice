<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Error | EquineCare</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-light);
            text-align: center;
            padding: 2rem;
        }
        .error-content h1 {
            font-size: 8rem;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 0;
            text-shadow: 4px 4px 0px rgba(212, 163, 115, 0.3);
        }
    </style>
</head>
<body>

    <div class="error-page">
        <div class="error-content">
            <img src="assets/images/3d_horse_illustration_1782132397352.png" alt="Lost Horse" style="max-width: 300px; margin: 0 auto 2rem; border-radius: 50%; box-shadow: var(--shadow-lg);">
            <h1>404</h1>
            <h2 style="font-size: 2rem; margin-bottom: 1rem;">Oops! You've strayed from the path.</h2>
            <p style="font-size: 1.2rem; color: var(--text-muted); margin-bottom: 2rem;">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
            <a href="index.html" class="btn btn-primary" style="font-size: 1.2rem; padding: 1rem 2rem;">
                <i class="fas fa-home"></i> Back to Homepage
            </a>
        </div>
    </div>

</body>
</html>
