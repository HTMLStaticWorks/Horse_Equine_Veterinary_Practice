<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | EquineCare</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .auth-container { 
            display: flex; 
            flex-direction: column;
            min-height: 100vh; 
            background: var(--bg-light);
            position: relative;
            padding: 2rem;
        }

        .auth-left {
            margin: auto; display: flex; align-items: center; justify-content: center;
            padding: 3rem; background: var(--bg-white);
            border-radius: var(--radius); box-shadow: var(--shadow-lg);
            width: 100%; max-width: 550px;
        }

        .auth-form-wrapper { width: 100%; max-width: 500px; }
        .auth-input {
            width: 100%; padding: 1rem; margin-bottom: 0.5rem;
            border: 1px solid var(--border); border-radius: var(--radius);
            background: var(--bg-light); color: var(--text-dark); transition: var(--transition);
        }
        .auth-input:focus {
            outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.2);
        }
        .strength-meter {
            height: 5px; background: #e2e8f0; border-radius: 5px; margin-bottom: 1.5rem; overflow: hidden;
            display: flex;
        }
        .strength-bar { height: 100%; transition: 0.3s; width: 0%; }
        .strength-bar.weak { background: #dc3545; width: 33%; }
        .strength-bar.medium { background: #ffc107; width: 66%; }
        .strength-bar.strong { background: #28a745; width: 100%; }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: transparent;
            color: var(--text-dark);
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 1rem;
            font-weight: 600;
        }
        .social-btn:hover {
            background: var(--bg-light);
            border-color: var(--text-muted);
        }
        .social-btn.google { color: #db4437; }
        .social-btn.apple { color: var(--text-dark); }

        @media (max-width: 768px) {
            .or-continue { white-space: nowrap; font-size: 0.8rem !important; padding: 0 5px !important; }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- Theme & RTL Buttons -->
        <div class="top-right-toggles" style="align-self: flex-end; margin-bottom: 1rem; display: flex; gap: 1rem; z-index: 50;">
            <button class="theme-toggle btn btn-outline" style="padding: 0.5rem 1rem; border-radius: 50%;"><i class="fas fa-moon"></i></button>
            <button class="rtl-toggle btn btn-outline" style="padding: 0.5rem 1rem; border-radius: 50%;"><i class="fas fa-exchange-alt"></i></button>
        </div>
        
        <!-- Left Side: Register Form -->
        <div class="auth-left">
            <div class="auth-form-wrapper">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <a href="index.html" class="logo" style="justify-content: center; font-size: 2rem;">
                        <i class="fas fa-horse-head"></i> EquineCare
                    </a>
                </div>
                <div style="text-align: center;">
                    <h3 style="margin-bottom: 0.5rem;">Create an Account</h3>
                    <p style="color: var(--text-muted); margin-bottom: 2rem;">Join EquineCare to access premium veterinary services.</p>
                </div>
                
                <form action="#" method="POST" id="registerForm">
                    <label style="font-weight: 600; margin-bottom: 0.5rem; display: block;">First Name</label>
                    <input type="text" class="auth-input" placeholder="John" style="margin-bottom: 1.5rem;" required>
                    
                    <label style="font-weight: 600; margin-bottom: 0.5rem; display: block;">Last Name</label>
                    <input type="text" class="auth-input" placeholder="Doe" style="margin-bottom: 1.5rem;" required>
                    
                    <label style="font-weight: 600; margin-bottom: 0.5rem; display: block;">Email Address</label>
                    <input type="email" class="auth-input" placeholder="you@example.com" style="margin-bottom: 1.5rem;" required>
                    
                    <label style="font-weight: 600; margin-bottom: 0.5rem; display: block;">Password</label>
                    <div style="position: relative; margin-bottom: 1.5rem;">
                        <input type="password" class="auth-input pwd-input" id="pwd" placeholder="Create a strong password" style="margin-bottom: 0;" required>
                        <i class="fas fa-eye pwd-toggle" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted);"></i>
                    </div>

                    <label style="font-weight: 600; margin-bottom: 0.5rem; display: block;">Confirm Password</label>
                    <div style="position: relative; margin-bottom: 1.5rem;">
                        <input type="password" class="auth-input pwd-input" placeholder="Confirm your password" style="margin-bottom: 0;" required>
                        <i class="fas fa-eye pwd-toggle" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted);"></i>
                    </div>
                    
                    <!-- Password Strength Meter -->
                    <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 0.2rem; color: var(--text-muted);">
                        <span>Password Strength</span>
                        <span id="strengthText">Weak</span>
                    </div>
                    <div class="strength-meter">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    
                    <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer; color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem;">
                        <input type="checkbox" required style="margin-top: 4px;">
                        <span>I agree to the <a href="#" style="color: var(--primary);">Terms of Service</a> and <a href="#" style="color: var(--primary);">Privacy Policy</a>.</span>
                    </label>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 2rem;">Create Account</button>
                </form>
                
                <div style="text-align: center; margin-bottom: 2rem; position: relative;">
                    <hr style="border: none; border-top: 1px solid var(--border);">
                    <span class="or-continue" style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--bg-white); padding: 0 10px; color: var(--text-muted); font-size: 0.9rem;">Or continue with</span>
                </div>
                
                <!-- Social Login Buttons -->
                <button class="social-btn"><i class="fab fa-google google"></i> Sign in with Google</button>
                <button class="social-btn"><i class="fab fa-apple apple"></i> Sign in with Apple</button>
                
                <p style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
                    Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600;">Sign In</a>
                </p>
            </div>
        </div>


    </div>

    <script src="assets/js/main.js"></script>
    <script>
        // Password Visibility Toggle
        document.querySelectorAll('.pwd-toggle').forEach(toggle => {
            toggle.addEventListener('click', function() {
                const input = this.previousElementSibling;
                if(input.type === 'password') {
                    input.type = 'text';
                    this.classList.remove('fa-eye');
                    this.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    this.classList.remove('fa-eye-slash');
                    this.classList.add('fa-eye');
                }
            });
        });

        // Simple Password Strength validation
        const pwd = document.getElementById('pwd');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');
        
        pwd.addEventListener('input', () => {
            const val = pwd.value;
            let strength = 0;
            if(val.length > 5) strength += 1;
            if(val.length > 8 && /[0-9]/.test(val) && /[A-Z]/.test(val)) strength += 1;
            if(val.length > 10 && /[^A-Za-z0-9]/.test(val)) strength += 1;
            
            strengthBar.className = 'strength-bar';
            if(strength === 0 && val.length > 0) {
                strengthBar.classList.add('weak');
                strengthText.innerText = 'Weak';
                strengthText.style.color = '#dc3545';
            } else if(strength === 1) {
                strengthBar.classList.add('weak');
                strengthText.innerText = 'Weak';
                strengthText.style.color = '#dc3545';
            } else if(strength === 2) {
                strengthBar.classList.add('medium');
                strengthText.innerText = 'Medium';
                strengthText.style.color = '#ffc107';
            } else if(strength === 3) {
                strengthBar.classList.add('strong');
                strengthText.innerText = 'Strong';
                strengthText.style.color = '#28a745';
            } else {
                strengthText.innerText = '';
            }
        });
    </script>
</body>
</html>
