<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EquineCare</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .auth-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: var(--bg-light);
            position: relative;
            padding: 2rem;
        }

        .auth-right {
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            background: var(--bg-white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 500px;
        }

        .auth-form-wrapper {
            width: 100%;
            max-width: 450px;
        }

        .auth-input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-light);
            color: var(--text-dark);
            transition: var(--transition);
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.2);
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: transparent;
            color: var(--text-dark);
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .social-btn:hover {
            background: var(--bg-light);
            border-color: var(--text-muted);
        }

        .social-btn.google {
            color: #db4437;
        }

        .social-btn.apple {
            color: var(--text-dark);
        }

        @media (max-width: 768px) {
            .top-right-toggles {
                top: 1rem !important;
                right: 1rem !important;
            }

            .auth-options {
                white-space: nowrap;
                font-size: 0.75rem;
                gap: 0.3rem;
            }

            .auth-options a,
            .auth-options label {
                font-size: 0.75rem;
            }

            .or-continue {
                white-space: nowrap;
                font-size: 0.8rem !important;
                padding: 0 5px !important;
            }
        }
    </style>
    <link rel="icon" type="image/png" href="assets/images/favicon_ai.png">
</head>

<body>

    <div class="auth-container">
        <!-- Theme & RTL Buttons -->
        <div class="top-right-toggles"
            style="align-self: flex-end; margin-bottom: 1rem; display: flex; gap: 0.25rem; z-index: 50;">
            <button class="theme-toggle btn btn-outline"><i
                    class="fas fa-moon"></i></button>
            <button class="rtl-toggle btn btn-outline"><i
                    class="fas fa-exchange-alt"></i></button>
        </div>

        <!-- Right Side: Login Form -->
        <div class="auth-right">
            <div class="auth-form-wrapper">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <a href="index.html" class="logo" style="justify-content: center; font-size: 2rem;">
                        <i class="fas fa-horse-head"></i> EquineCare
                    </a>
                </div>
                <div style="text-align: center;">
                    <h3 style="margin-bottom: 0.5rem;">Sign In</h3>
                    <p style="color: var(--text-muted); margin-bottom: 2rem;">Please enter your credentials to proceed.
                    </p>
                </div>

                <form action="#" method="POST">
                    <label style="font-weight: 600; margin-bottom: 0.5rem; display: block;">Email Address</label>
                    <input type="email" class="auth-input" placeholder="" required>

                    <label style="font-weight: 600; margin-bottom: 0.5rem; display: block;">Password</label>
                    <div style="position: relative; margin-bottom: 1.5rem;">
                        <input type="password" class="auth-input pwd-input" placeholder="" style="margin-bottom: 0;"
                            required>
                        <i class="fas fa-eye pwd-toggle"
                            style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted);"></i>
                    </div>

                    <div class="auth-options"
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                        <label
                            style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: var(--text-muted);">
                            <input type="checkbox"> Remember Me
                        </label>
                        <a href="#" style="color: var(--primary); font-weight: 600;">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary"
                        style="width: 100%; margin-bottom: 2rem;">Login</button>
                </form>

                <div style="text-align: center; margin-bottom: 2rem; position: relative;">
                    <hr style="border: none; border-top: 1px solid var(--border);">
                    <span class="or-continue"
                        style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--bg-white); padding: 0 10px; color: var(--text-muted); font-size: 0.9rem;">Or
                        continue with</span>
                </div>

                <!-- Social Login Buttons -->
                <button class="social-btn"><i class="fab fa-google google"></i> Sign in with Google</button>
                <button class="social-btn"><i class="fab fa-apple apple"></i> Sign in with Apple</button>

                <p style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
                    Don't have an account? <a href="register.html"
                        style="color: var(--primary); font-weight: 600;">Register Here</a>
                </p>
            </div>
        </div>
    </div>
    <script src="assets/js/main.js"></script>
    <script>
        document.querySelectorAll('.pwd-toggle').forEach(toggle => {
            toggle.addEventListener('click', function () {
                const input = this.previousElementSibling;
                if (input.type === 'password') {
                    input.type = 'text';
                    this.classList.remove('fa-eye');
                    this.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    this.classList.remove('fa-eye-slash');
                    this.classList.add('fa-eye');
                }
            });
        });
    </script>
    <!-- Back to Top -->
    <a href="#"
        style="position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; z-index: 1000; text-decoration: none; box-shadow: var(--shadow-md);">
        <i class="fas fa-arrow-up"></i>
    </a>
</body>

</html>
