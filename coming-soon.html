<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | EquineCare</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .coming-soon {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('assets/images/3d_horse_illustration_1782132397352.png') center/cover no-repeat;
            position: relative;
            text-align: center;
            padding: 2rem;
            color: white;
        }
        .coming-soon::after {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 17, 32, 0.85);
            backdrop-filter: blur(5px);
            z-index: 0;
        }
        .content-wrapper {
            position: relative;
            z-index: 10;
            max-width: 800px;
        }
        .countdown {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 3rem 0;
        }
        .time-box {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 1.5rem;
            border-radius: var(--radius);
            min-width: 100px;
            backdrop-filter: blur(10px);
        }
        .time-number {
            font-size: 3rem;
            font-family: var(--font-serif);
            font-weight: bold;
            color: var(--secondary);
            line-height: 1;
        }
        .newsletter-form {
            display: flex;
            max-width: 500px;
            margin: 0 auto 3rem;
            gap: 10px;
        }
        .newsletter-input {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 50px;
            border: none;
            outline: none;
            font-size: 1rem;
        }
        .newsletter-btn {
            padding: 1rem 2rem;
            border-radius: 50px;
            border: none;
            background: var(--secondary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
        }
        .newsletter-btn:hover { background: #b5895e; }
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }
        .social-icons a {
            color: white;
            font-size: 1.5rem;
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            transition: var(--transition);
        }
        .social-icons a:hover {
            background: var(--secondary);
            transform: translateY(-5px);
        }
        @media (max-width: 768px) {
            .countdown { gap: 1rem; flex-wrap: wrap; }
            .newsletter-form { flex-direction: column; }
            .newsletter-btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="coming-soon">
        <div class="content-wrapper">
            <div style="font-size: 2.5rem; margin-bottom: 1rem; color: var(--secondary);">
                <i class="fas fa-horse-head"></i>
            </div>
            <h1 style="font-size: 4rem; color: white; margin-bottom: 1rem;">Something Big Is Coming</h1>
            <p style="font-size: 1.25rem; color: rgba(255,255,255,0.8);">Our new state-of-the-art equine veterinary facility and digital platform is launching soon. Prepare for the future of horse care.</p>
            
            <div class="countdown">
                <div class="time-box">
                    <div class="time-number">14</div>
                    <div style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;">Days</div>
                </div>
                <div class="time-box">
                    <div class="time-number">08</div>
                    <div style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;">Hours</div>
                </div>
                <div class="time-box">
                    <div class="time-number">45</div>
                    <div style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;">Minutes</div>
                </div>
                <div class="time-box">
                    <div class="time-number">12</div>
                    <div style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;">Seconds</div>
                </div>
            </div>
            
            <form class="newsletter-form">
                <input type="email" class="newsletter-input" placeholder="Enter your email address..." required>
                <button type="submit" class="newsletter-btn">Notify Me</button>
            </form>
            
            <div class="social-icons">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </div>

</body>
</html>
